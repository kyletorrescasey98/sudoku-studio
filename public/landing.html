<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku Studio</title>
  <meta name="description" content="Challenge your mind with Sudoku Studio" />
  <meta property="og:title" content="Sudoku Studio" />
  <meta property="og:description" content="sudokusocial.web.app" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sudokusocial.web.app/" />
  <meta property="og:image" content="https://sudokusocial.web.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Sudoku Studio" />
  <meta name="twitter:description" content="sudokusocial.web.app" />
  <meta name="twitter:image" content="https://sudokusocial.web.app/og-image.png" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#f8f9fa; --surface:#ffffff; --surface2:#f0f2f5; --surface3:#e4e6ea;
      --accent:#2563eb; --accent2:#7c3aed; --text:#111827; --text2:#6b7280;
      --border:#d1d5db; --success:#16a34a;
    }
    body {
      font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
      background:linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color:var(--text);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .container {
      text-align:center;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:32px;
      animation:fadeIn 0.6s ease-in;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .logo-section {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:16px;
    }
    .sudoku-grid {
      width:min(140px, 35vw);
      height:min(140px, 35vw);
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:2px;
      padding:8px;
      background:#fff;
      border-radius:14px;
      box-shadow:0 12px 48px rgba(0,0,0,0.25);
    }
    .grid-box {
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:1px;
      background:#fff;
      border:2px solid #111;
      border-radius:4px;
    }
    .grid-cell {
      width:100%;
      aspect-ratio:1;
      background:linear-gradient(135deg, rgba(37,99,235,0.1), rgba(124,58,237,0.1));
      border:1px solid rgba(17,24,39,0.15);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:clamp(8px, 2vw, 14px);
      font-weight:700;
      color:var(--accent);
    }
    .grid-cell.filled { color:var(--accent2); font-weight:900; }
    .title {
      color:#fff;
      font-size:clamp(2rem, 8vw, 3.5rem);
      font-weight:900;
      letter-spacing:2px;
      text-transform:uppercase;
      margin:12px 0 4px;
      text-shadow:0 4px 12px rgba(0,0,0,0.15);
    }
    .subtitle {
      color:rgba(255,255,255,0.95);
      font-size:clamp(0.9rem, 3vw, 1.3rem);
      font-weight:600;
      letter-spacing:1px;
      text-shadow:0 2px 8px rgba(0,0,0,0.1);
    }
    .tagline {
      color:rgba(255,255,255,0.85);
      font-size:clamp(0.75rem, 2.5vw, 1rem);
      margin-top:16px;
      max-width:420px;
      line-height:1.6;
    }
    .divider {
      width:60px;
      height:3px;
      background:rgba(255,255,255,0.6);
      border-radius:999px;
    }
    .loading {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      color:#fff;
      font-size:0.9rem;
      font-weight:600;
      margin-top:20px;
    }
    .spinner {
      width:20px;
      height:20px;
      border:3px solid rgba(255,255,255,0.4);
      border-top-color:#fff;
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

  <script src="firebase-config.js"></script>
  <script>
    // Check if user is logged in
    setTimeout(() => {
      // Import Firebase (if needed)
      if (typeof firebase !== 'undefined') {
        firebase.auth().onAuthStateChanged((user) => {
          if (user) {
            // User is signed in, go to game
            window.location.href = 'explore.html';
          } else {
            // No user, redirect to sign in
            window.location.href = 'index.html';
          }
        });
      } else {
        // Firebase not loaded, just go to index
        window.location.href = 'index.html';
      }
    }, 1500);
  </script>
